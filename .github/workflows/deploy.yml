name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      health_url:
        description: Full web URL or /api/health URL to verify after deploy. Falls back to environment var ROYCOPHAROS_HEALTH_URL.
        required: false
        type: string
      sync_url:
        description: Optional sync Worker URL for the initial post-deploy sync. Falls back to environment var ROYCOPHAROS_SYNC_URL.
        required: false
        type: string
      trigger_sync:
        description: Trigger an initial sync before the health gate when a sync URL and token are available.
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Guard automatic deploy target
        id: auto_guard
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          current_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [ "$current_sha" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale deploy for ${{ github.event.workflow_run.head_sha }}; origin/main is ${current_sha}."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true' }}
        run: npm ci

      - name: Typecheck
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true' }}
        run: npm run typecheck

      - name: Test
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true' }}
        run: npm run test

      - name: Deploy staging
        if: ${{ (github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true') && env.DEPLOY_ENV == 'staging' }}
        run: npm run deploy:staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy production
        if: ${{ (github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true') && env.DEPLOY_ENV == 'production' }}
        run: npm run deploy:production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Trigger initial sync
        if: ${{ (github.event_name == 'workflow_run' && steps.auto_guard.outputs.deploy == 'true') || (github.event_name == 'workflow_dispatch' && inputs.trigger_sync) }}
        env:
          INPUT_SYNC_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_url || '' }}
          ENV_SYNC_URL: ${{ vars.ROYCOPHAROS_SYNC_URL }}
          SYNC_ADMIN_TOKEN: ${{ secrets.SYNC_ADMIN_TOKEN }}
        run: |
          sync_url="${INPUT_SYNC_URL:-$ENV_SYNC_URL}"
          if [ -z "$sync_url" ] || [ -z "$SYNC_ADMIN_TOKEN" ]; then
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "Skipping automatic post-deploy sync because ROYCOPHAROS_SYNC_URL or SYNC_ADMIN_TOKEN is not configured."
              exit 0
            fi
          fi
          if [ -z "$sync_url" ]; then
            echo "ROYCOPHAROS_SYNC_URL or sync_url input is required when trigger_sync is true." >&2
            exit 1
          fi
          if [ -z "$SYNC_ADMIN_TOKEN" ]; then
            echo "SYNC_ADMIN_TOKEN secret is required when trigger_sync is true." >&2
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${SYNC_ADMIN_TOKEN}" \
            "${sync_url}"

      - name: Verify deployed health
        if: ${{ github.event_name == 'workflow_dispatch' || steps.auto_guard.outputs.deploy == 'true' }}
        env:
          INPUT_HEALTH_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.health_url || '' }}
          ENV_HEALTH_URL: ${{ vars.ROYCOPHAROS_HEALTH_URL }}
        run: |
          health_url="${INPUT_HEALTH_URL:-$ENV_HEALTH_URL}"
          if [ -z "$health_url" ] && [ "$DEPLOY_ENV" = "production" ]; then
            health_url="https://royco.pharos.watch/api/health"
          fi
          if [ -z "$health_url" ]; then
            echo "ROYCOPHAROS_HEALTH_URL or health_url input is required for deploy health checks." >&2
            exit 1
          fi
          npm run smoke:health -- "$health_url"
